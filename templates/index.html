{% extends "base.html" %}

{% block title %}Lost Ark Scheduler{% endblock %}

{% block body %}
  <div class="page">
    <header class="topbar">
      <div class="title-wrap">
        <h1>Lost Ark Scheduler</h1>
        <p>Search rosters, create members, and keep your raid planning workflow in one place.</p>
      </div>

      <div class="top-actions">
        <a class="button" href="/">Home</a>
        <a class="button primary" href="/members">View Members</a>
      </div>
    </header>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>Search Roster</h2>
        </div>

        <div class="panel-body">
          <form class="form-grid" action="/search" method="get">
            <div class="field-row">
              <div class="field-group">
                <label for="region">Region</label>
                <input id="region" name="region" type="text" placeholder="CE" required />
              </div>

              <div class="field-group">
                <label for="name">Character Name</label>
                <input id="name" name="name" type="text" placeholder="Minetugay" required />
              </div>
            </div>

            <div class="form-actions">
              <button class="submit" type="submit">Search Roster</button>
            </div>
          </form>
        </div>
      </article>
    </section>

    <section class="panel" style="margin-top: 20px;">
      <div class="panel-head">
        <h2>Create Member</h2>
      </div>

      <div class="panel-body">
        <form class="form-grid" action="/members/create" method="post">
          <div class="field-row">
            <div class="field-group">
              <label for="display_name">Display Name</label>
              <input id="display_name" name="display_name" type="text" required />
            </div>

            <div class="field-group">
              <label for="discord_name">Discord Name</label>
              <input id="discord_name" name="discord_name" type="text" />
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="member_region">Region</label>
              <input id="member_region" name="region" type="text" />
            </div>

            <div class="field-group">
              <label for="world">Server Name</label>
              <input id="world" name="world" type="text" />
            </div>
          </div>

          <div class="field-group">
            <label for="roster_name">Roster Name</label>
            <input id="roster_name" name="roster_name" type="text" />
          </div>

          <div class="field-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Support main, alt availability, guild notes..."></textarea>
          </div>

          <div class="form-actions">
            <button class="submit" type="submit">Create Member</button>
          </div>
        </form>
      </div>
    </section>
  </div>
{% endblock %}
